services:
  - type: web
    name: suvidha-one-backend
    env: rust
    plan: free
    buildCommand: cargo build --release
    startCommand: cargo run --release
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: suvidha-one-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: suvidha-one-redis
          property: connectionString
      - key: JWT_PUBLIC_KEY_PEM
        sync: false
      - key: FRONTEND_URLS
        value: https://suvidha-one-frontend.vercel.app
      - key: GOOGLE_TTS_API_KEY
        sync: false
    autoDeploy: true
    healthCheckPath: /health

databases:
  - name: suvidha-one-db
    plan: free
    region: oregon

redis:
  - name: suvidha-one-redis
    plan: free
    region: oregon