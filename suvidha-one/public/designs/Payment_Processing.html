<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&amp;family=Noto+Sans+Devanagari:wght@400;500;700;900&amp;family=Public+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#360f00",
              "on-secondary": "#ffffff",
              "secondary": "#a33e00",
              "on-tertiary-fixed-variant": "#00522d",
              "on-secondary-container": "#541d00",
              "primary-fixed": "#dbe1ff",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#7c2e00",
              "on-primary-fixed": "#00174c",
              "surface-variant": "#e0e3e6",
              "primary-fixed-dim": "#b4c5ff",
              "outline-variant": "#c4c6d3",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#a3f4bc",
              "on-error": "#ffffff",
              "on-surface-variant": "#444651",
              "primary-container": "#1a3c8f",
              "surface-dim": "#d8dadd",
              "inverse-surface": "#2d3133",
              "inverse-on-surface": "#eff1f4",
              "on-background": "#191c1e",
              "tertiary-container": "#004d29",
              "outline": "#747683",
              "on-tertiary-container": "#70bf8b",
              "on-primary-fixed-variant": "#204194",
              "surface-tint": "#3c5aad",
              "error": "#ba1a1a",
              "surface-container-high": "#e6e8eb",
              "on-primary-container": "#92abff",
              "secondary-fixed-dim": "#ffb596",
              "inverse-primary": "#b4c5ff",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#00210f",
              "secondary-fixed": "#ffdbcd",
              "secondary-container": "#fe6500",
              "surface-bright": "#f7f9fc",
              "background": "#f7f9fc",
              "surface-container-highest": "#e0e3e6",
              "tertiary": "#00341a",
              "tertiary-fixed-dim": "#88d8a1",
              "on-surface": "#191c1e",
              "on-error-container": "#93000a",
              "primary": "#00256f",
              "surface": "#f7f9fc",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#eceef1",
              "surface-container-low": "#f2f4f7"
            },
            fontFamily: {
              "headline": ["Public Sans", "Noto Sans Devanagari"],
              "body": ["Public Sans", "Noto Sans Devanagari"],
              "label": ["Public Sans", "Noto Sans Devanagari"],
              "noto": ["Noto Sans", "Noto Sans Devanagari"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            font-size: 48px;
        }
        .icon-xl { font-size: 160px !important; }
        .processing-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col overflow-x-hidden">
<!-- TopNavBar Shell -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-xl shadow-blue-900/5 docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-16 h-[120px]">
<div class="flex items-center gap-4">
<span class="text-5xl font-black text-blue-900 dark:text-blue-100 font-noto">Suvidha One</span>
</div>
<div class="flex items-center gap-12">
<button class="hover:bg-slate-100 p-4 rounded-full transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-blue-900" data-icon="language">language</span>
</button>
<button class="hover:bg-slate-100 p-4 rounded-full transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-blue-900" data-icon="record_voice_over">record_voice_over</span>
</button>
<button class="hover:bg-slate-100 p-4 rounded-full transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-blue-900" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-16 py-24 text-center">
<!-- Architectural Layering Container -->
<div class="w-full max-w-6xl bg-surface-container-lowest rounded-[48px] shadow-2xl shadow-on-surface/5 p-20 flex flex-col items-center space-y-16">
<!-- Central Icon -->
<div class="relative flex items-center justify-center">
<div class="absolute w-[240px] h-[240px] border-[12px] border-primary-container/10 rounded-full"></div>
<div class="absolute w-[240px] h-[240px] border-t-[12px] border-primary-container rounded-full animate-spin"></div>
<span class="material-symbols-outlined text-primary-container icon-xl processing-pulse" data-icon="hourglass_empty">hourglass_empty</span>
</div>
<!-- Titles Section -->
<div class="space-y-4">
<h1 class="text-[72px] font-black leading-tight text-primary font-headline">Processing Payment...</h1>
<h2 class="text-[60px] font-bold leading-tight text-primary-container font-headline">भुगतान प्रोसेस हो रहा है...</h2>
</div>
<!-- Amount Display -->
<div class="bg-primary-fixed/30 px-16 py-8 rounded-[32px] border-b-4 border-primary">
<span class="text-[96px] font-black tracking-tight text-primary-container">₹2,050.00</span>
</div>
<!-- Status Messages -->
<div class="space-y-4 max-w-4xl">
<p class="text-[48px] font-medium text-on-surface-variant leading-relaxed">Please wait while we process your payment</p>
<p class="text-[48px] font-medium text-on-surface-variant/80">कृपया प्रतीक्षा करें</p>
</div>
<!-- Action Area -->
<div class="pt-8">
<button class="bg-surface-container-highest text-error px-20 py-8 rounded-xl text-[48px] font-bold hover:bg-error-container transition-all active:scale-95 flex items-center gap-4">
<span class="material-symbols-outlined" data-icon="cancel">cancel</span>
                    Cancel Payment
                </button>
</div>
</div>
<!-- Semantic Step Indicator (Editorial Intent) -->
<div class="mt-16">
<span class="text-[96px] font-black text-primary-fixed-dim/20 pointer-events-none select-none">STEP 03</span>
</div>
</main>
<!-- SideNavBar (Accessibility Shell) -->
<aside class="fixed left-0 top-1/2 -translate-y-1/2 z-[60] flex flex-col p-4 bg-black rounded-r-3xl shadow-2xl shadow-black/50 space-y-4">
<div class="mb-4 px-4 border-b border-yellow-400/20 pb-4">
<h3 class="text-yellow-400 font-bold text-[32px] font-noto">Accessibility</h3>
<p class="text-white/60 text-[20px]">Kiosk Settings</p>
</div>
<button class="flex flex-col items-center justify-center p-6 text-white hover:bg-yellow-500 hover:text-black rounded-xl transition-all active:scale-105 h-[120px] w-[140px]">
<span class="material-symbols-outlined" data-icon="contrast">contrast</span>
<span class="text-[24px] font-bold mt-2">Contrast</span>
</button>
<button class="flex flex-col items-center justify-center p-6 text-white hover:bg-yellow-500 hover:text-black rounded-xl transition-all active:scale-105 h-[120px] w-[140px]">
<span class="material-symbols-outlined" data-icon="format_size">format_size</span>
<span class="text-[24px] font-bold mt-2">Text+</span>
</button>
</aside>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-slate-100 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] border-t-4 border-blue-900/10">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-blue-900 px-8 h-[100px] min-w-[200px] hover:bg-blue-50 transition-all">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-noto font-medium text-[32px]">Home</span>
</button>
<!-- History (ACTIVE) -->
<button class="flex flex-col items-center justify-center bg-orange-600 text-white rounded-3xl px-12 py-4 h-[100px] min-w-[200px] brightness-110 scale-98 transition-all">
<span class="material-symbols-outlined" data-icon="history" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-noto font-medium text-[32px]">History</span>
</button>
<!-- Help -->
<button class="flex flex-col items-center justify-center text-blue-900 px-8 h-[100px] min-w-[200px] hover:bg-blue-50 transition-all">
<span class="material-symbols-outlined" data-icon="help">help</span>
<span class="font-noto font-medium text-[32px]">Help</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-blue-900 px-8 h-[100px] min-w-[200px] hover:bg-blue-50 transition-all">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-noto font-medium text-[32px]">Settings</span>
</button>
</nav>
<!-- Spacing for bottom nav -->
<div class="h-[180px]"></div>
</body></html>
