<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Suvidha One - Authenticate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&amp;family=Noto+Sans+Devanagari:wght@400;500;700;900&amp;family=Public+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#a3f4bc",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#204194",
                        "on-primary-fixed": "#00174c",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "primary-container": "#1a3c8f",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#444651",
                        "tertiary-container": "#004d29",
                        "on-tertiary-fixed": "#00210f",
                        "on-tertiary-container": "#70bf8b",
                        "surface-container-highest": "#e0e3e6",
                        "background": "#f7f9fc",
                        "surface-bright": "#f7f9fc",
                        "tertiary-fixed-dim": "#88d8a1",
                        "tertiary": "#00341a",
                        "on-primary-container": "#92abff",
                        "surface-container": "#eceef1",
                        "surface-variant": "#e0e3e6",
                        "on-secondary-container": "#541d00",
                        "surface-dim": "#d8dadd",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f2f4f7",
                        "on-secondary-fixed-variant": "#7c2e00",
                        "secondary-container": "#fe6500",
                        "primary": "#00256f",
                        "on-tertiary-fixed-variant": "#00522d",
                        "on-surface": "#191c1e",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#ffb596",
                        "surface": "#f7f9fc",
                        "on-background": "#191c1e",
                        "outline-variant": "#c4c6d3",
                        "secondary-fixed": "#ffdbcd",
                        "inverse-primary": "#b4c5ff",
                        "surface-container-high": "#e6e8eb",
                        "outline": "#747683",
                        "primary-fixed-dim": "#b4c5ff",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-fixed": "#360f00",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2d3133",
                        "inverse-on-surface": "#eff1f4",
                        "surface-tint": "#3c5aad",
                        "secondary": "#a33e00"
                    },
                    fontFamily: {
                        "headline": ["Public Sans", "Noto Sans Devanagari"],
                        "body": ["Public Sans", "Noto Sans Devanagari"],
                        "label": ["Public Sans", "Noto Sans Devanagari"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        body {
            font-family: 'Public Sans', 'Noto Sans Devanagari', sans-serif;
            background-color: #f7f9fc;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-xl shadow-blue-900/5 docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-16 h-[120px]">
<div class="text-5xl font-black text-blue-900 dark:text-blue-100 font-['Noto_Sans']">
            Suvidha One
        </div>
<div class="flex items-center gap-12">
<button class="text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-4 rounded-full transition-all">
<span class="material-symbols-outlined !text-[48px]" data-icon="language">language</span>
</button>
<button class="text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-4 rounded-full transition-all">
<span class="material-symbols-outlined !text-[48px]" data-icon="record_voice_over">record_voice_over</span>
</button>
<button class="text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 p-4 rounded-full transition-all">
<span class="material-symbols-outlined !text-[48px]" data-icon="account_circle">account_circle</span>
</button>
</div>
</nav>
<!-- SideNavBar (Accessibility Tools) -->
<aside class="fixed left-0 top-1/2 -translate-y-1/2 z-[60] flex flex-col p-4 bg-black dark:bg-black rounded-r-3xl h-fit self-center shadow-2xl shadow-black/50">
<div class="mb-6 px-4">
<h3 class="text-yellow-400 font-bold font-['Noto_Sans'] text-[32px]">Accessibility</h3>
<p class="text-white opacity-70 text-[20px]">Kiosk Settings</p>
</div>
<div class="flex flex-col gap-4">
<button class="flex items-center gap-4 text-white hover:bg-yellow-500 p-6 rounded-xl transition-all h-[100px]">
<span class="material-symbols-outlined !text-[40px]" data-icon="contrast">contrast</span>
<span class="font-bold text-[32px] font-['Noto_Sans']">High Contrast</span>
</button>
<button class="flex items-center gap-4 text-white hover:bg-yellow-500 p-6 rounded-xl transition-all h-[100px]">
<span class="material-symbols-outlined !text-[40px]" data-icon="format_size">format_size</span>
<span class="font-bold text-[32px] font-['Noto_Sans']">Large Text</span>
</button>
</div>
</aside>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center px-16 pt-24 pb-48 max-w-[1440px] mx-auto w-full">
<!-- Screen Title -->
<header class="w-full mb-20 text-center">
<h1 class="text-[72px] font-black text-primary leading-tight mb-4">
                Authenticate / पहचान
            </h1>
<p class="text-[48px] text-on-surface-variant font-medium">
                Please select your preferred login method
            </p>
</header>
<!-- Authentication Options Bento Grid -->
<div class="grid grid-cols-1 gap-12 w-full max-w-5xl">
<!-- Mobile OTP -->
<button class="group flex items-center bg-surface-container-low hover:bg-surface-container-high transition-all rounded-3xl p-10 h-[180px] shadow-sm active:scale-95 text-left w-full">
<div class="bg-primary/5 group-hover:bg-primary/10 p-6 rounded-2xl mr-12 shrink-0">
<span class="material-symbols-outlined !text-[80px] text-primary" data-icon="smartphone">smartphone</span>
</div>
<div class="flex flex-col">
<span class="text-[36px] font-bold text-primary leading-tight">Mobile OTP / मोबाइल ओटीपी</span>
<span class="text-[28px] text-on-surface-variant">Fastest way to login using your phone</span>
</div>
<span class="material-symbols-outlined ml-auto !text-[48px] text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Aadhaar Biometric -->
<button class="group flex items-center bg-surface-container-low hover:bg-surface-container-high transition-all rounded-3xl p-10 h-[180px] shadow-sm active:scale-95 text-left w-full">
<div class="bg-primary/5 group-hover:bg-primary/10 p-6 rounded-2xl mr-12 shrink-0">
<span class="material-symbols-outlined !text-[80px] text-primary" data-icon="fingerprint">fingerprint</span>
</div>
<div class="flex flex-col">
<span class="text-[36px] font-bold text-primary leading-tight">Aadhaar Biometric / आधार बायोमेट्रिक</span>
<span class="text-[28px] text-on-surface-variant">Verify using your thumb impression</span>
</div>
<span class="material-symbols-outlined ml-auto !text-[48px] text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Scan QR Code -->
<button class="group flex items-center bg-surface-container-low hover:bg-surface-container-high transition-all rounded-3xl p-10 h-[180px] shadow-sm active:scale-95 text-left w-full">
<div class="bg-primary/5 group-hover:bg-primary/10 p-6 rounded-2xl mr-12 shrink-0">
<span class="material-symbols-outlined !text-[80px] text-primary" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<div class="flex flex-col">
<span class="text-[36px] font-bold text-primary leading-tight">Scan QR Code / क्यूआर कोड स्कैन करें</span>
<span class="text-[28px] text-on-surface-variant">Scan using Suvidha App on your phone</span>
</div>
<span class="material-symbols-outlined ml-auto !text-[48px] text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Continue as Guest -->
<button class="group flex items-center bg-white border-4 border-dashed border-outline-variant hover:border-primary transition-all rounded-3xl p-10 h-[180px] active:scale-95 text-left w-full">
<div class="bg-slate-100 group-hover:bg-primary/5 p-6 rounded-2xl mr-12 shrink-0">
<span class="material-symbols-outlined !text-[80px] text-slate-500 group-hover:text-primary" data-icon="person_outline">person_outline</span>
</div>
<div class="flex flex-col">
<span class="text-[36px] font-bold text-slate-700 group-hover:text-primary leading-tight">Continue as Guest / अतिथि के रूप में जारी रखें</span>
<span class="text-[28px] text-on-surface-variant">Browse limited services without logging in</span>
</div>
<span class="material-symbols-outlined ml-auto !text-[48px] text-slate-400 group-hover:text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-slate-100 dark:bg-slate-800 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] border-t-4 border-blue-900/10">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-blue-900 dark:text-blue-200 px-8 h-[100px] hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-all min-w-[200px]">
<span class="material-symbols-outlined !text-[48px]" data-icon="home">home</span>
<span class="font-['Noto_Sans'] font-medium text-[32px]">Home</span>
</button>
<!-- History -->
<button class="flex flex-col items-center justify-center text-blue-900 dark:text-blue-200 px-8 h-[100px] hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-all min-w-[200px]">
<span class="material-symbols-outlined !text-[48px]" data-icon="history">history</span>
<span class="font-['Noto_Sans'] font-medium text-[32px]">History</span>
</button>
<!-- Help -->
<button class="flex flex-col items-center justify-center text-blue-900 dark:text-blue-200 px-8 h-[100px] hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-all min-w-[200px]">
<span class="material-symbols-outlined !text-[48px]" data-icon="help">help</span>
<span class="font-['Noto_Sans'] font-medium text-[32px]">Help</span>
</button>
<!-- Settings (Active Context: On authentication, settings/account logic often maps here) -->
<button class="flex flex-col items-center justify-center bg-orange-600 text-white rounded-3xl px-12 py-4 h-[100px] brightness-110 scale-98 transition-all min-w-[200px]">
<span class="material-symbols-outlined !text-[48px]" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-['Noto_Sans'] font-medium text-[32px]">Settings</span>
</button>
</footer>
</body></html>
